<!DOCTYPE html>
<html>
    <head>
        <title>WAD Viewer</title>
        <style>
            .loading {
                display: relative;
            }
            .loading::after {
                display: absolute;
                content: " ";
                top: 0; left: 0; right: 0; bottom: 0;
                background-color: black;
                opacity: .5;
            }
            .overlay {
                position: fixed;
                color: white;
                font: 12px monospace;
                pointer-events: none;
                opacity: 0.7;
                line-height: 1.6;
                z-index: 1;
                text-shadow: 1px 1px 2px black, 0 0 4px black;
                white-space: pre-line;
            }
            .overlay .lowerleft {
                position: fixed;
                bottom: 10px;
                left: 10px;
            }
        </style>
    </head>
    <body>
        <div class="overlay">
            <div class="lowerleft"></div>
        </div>
    </body>
    <script src="out.js"></script>
</html>
